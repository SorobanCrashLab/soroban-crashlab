name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run test
      - run: pnpm run build

  core:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: contracts/crashlab-core
    steps:
      - uses: actions/checkout@v4
      - run: cargo test --all-targets

  soroban-example:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: contracts/soroban-example
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable with wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts/soroban-example
      - name: Run tests
        run: cargo test --all-targets
      - name: Build WASM artifact
        run: cargo build --target wasm32-unknown-unknown --release

  secrets-scan:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret scanning with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ops-scripts-syntax:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - run: bash -n scripts/backlog-freshness-review.sh
      - run: bash -n scripts/contracts/build-soroban-example.sh

  e2e:
    needs: [web]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cache the Playwright browser binaries so repeated runs don't
      # re-download ~300 MB of Chromium on every job.
      - name: Get Playwright version for cache key
        id: pw-version
        run: |
          VERSION=$(node -e "const p=require('./package.json');console.log(p.devDependencies['@playwright/test']||'unknown')")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore Playwright browser cache
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ steps.pw-version.outputs.version }}-${{ runner.os }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright OS dependencies (always)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      # Build the Next.js app so the webServer block in playwright.config.ts
      # can run `next start` against a production bundle (not the dev server).
      - name: Build Next.js for E2E
        run: pnpm run build

      - name: Run Playwright E2E tests
        run: pnpm run e2e

      # Always upload the HTML report and any failure traces so they're
      # available for download from the Actions summary.
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14

      - name: Upload test traces (failures only)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: apps/web/test-results/
          retention-days: 7

  regression:
    needs: [core, web, soroban-example]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: contracts/crashlab-core
    steps:
      - uses: actions/checkout@v4
      - run: cargo run --bin crashlab -- regression-suite fixtures/
